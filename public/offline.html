<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Rally — offline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
        background: radial-gradient(120% 80% at 50% 8%, #20172b 0%, #130d1a 60%);
        color: #f6f1f9;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }
      .card { max-width: 22rem; }
      img { width: 76px; height: 76px; margin: 0 auto 20px; display: block; }
      h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; margin: 0 0 10px; }
      p { color: #a89fb4; line-height: 1.5; margin: 0 0 24px; }
      button {
        appearance: none; border: 0; cursor: pointer;
        font: inherit; font-weight: 600; color: #130d1a;
        padding: 13px 22px; border-radius: 999px;
        background: linear-gradient(90deg, #ff6b4a, #ffc36b);
        transition: transform 120ms cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icons/icon.svg" alt="Rally" />
      <h1>You're offline</h1>
      <p>Rally needs a connection to fill the bar. Reconnect and we'll pick up right where you left off.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
